# Per-asset strategy configuration for live_momentum_buy.py
#
# Required fields per asset:
#   sigma_value  - std dev of 5-min window moves (in asset price units)
#   sigma_entry  - number of sigmas needed to trigger a trade
#   max_pm_price - max Polymarket ask price to accept (edge threshold)
#
# Optional fields (fall back to CLI defaults if omitted):
#   direction    - "up", "down", or "both" (default: both)
#   wallet_pct   - percent of wallet to deploy per trade (default: from config.py)
#   name         - instance name for trades/status files (default: momentum)
#   momentum     - per-coin momentum trading config (overrides global MOMENTUM defaults)
#   model        - per-coin model trading config (overrides global MODEL defaults)

# Global strategy defaults (can be overridden per coin)
MOMENTUM:
  fixed_usdc: 1.1
  multi_trade_cooldown: 5   # 0 = one trade per window; N = re-enter every N seconds while edge >= threshold
  max_trades_per_window: 2   # maximum number of trades allowed per window (0 = unlimited)
  min_fav_imbalance: 0.20      # min direction-adjusted OB snapshot imbalance to execute (null = disabled)
  min_fav_imbalance_mean: null # min direction-adjusted 5s mean imbalance to execute (null = disabled)


MODEL:
  window_start: 15
  window_end: 280
  edge_threshold: .20
  fixed_usdc: 1.1
  multi_trade_cooldown: 5 # 0 = one trade per window; N = re-enter every N seconds while edge >= threshold
  max_trades_per_window: 5 # maximum number of trades allowed per window (0 = unlimited)
  max_slippage: .23       # max ask movement above trigger price before FOK rejects
  min_fav_imbalance: 0.45      # min direction-adjusted OB snapshot imbalance to execute (null = disabled)


