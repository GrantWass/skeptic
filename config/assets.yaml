# Per-asset strategy configuration for live_momentum_buy.py
#
# Required fields per asset:
#   sigma_value  - std dev of 5-min window moves (in asset price units)
#   sigma_entry  - number of sigmas needed to trigger a trade
#   max_pm_price - max Polymarket ask price to accept (edge threshold)
#
# Optional fields (fall back to CLI defaults if omitted):
#   direction    - "up", "down", or "both" (default: both)
#   wallet_pct   - percent of wallet to deploy per trade (default: from config.py)
#   name         - instance name for trades/status files (default: momentum)

